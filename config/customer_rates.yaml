# Customer rate matrix — what we CHARGE customers (revenue side)
#
# Each customer entry can specify any of:
#   rate_per_mile:    $/mile billed to the customer
#   rate_per_stop:    $/stop billed to the customer
#   rate_per_cwt:     $/100 lbs (weight basis)
#   minimum_charge:   minimum invoice per route
#
# A "default" entry is used when no customer-specific entry exists.
# Edit this file directly OR via the Rate Matrix page in the dashboard.

default:
  rate_per_mile: 2.25
  rate_per_stop: 95.00
  rate_per_cwt: 0.00
  minimum_charge: 250.00

