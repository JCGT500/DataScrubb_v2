database:
  path: data/datascrubb.db
pipeline:
  otp_tolerance_minutes: 120
  sap_match_max_hours: 36
  telemetry_window_minutes: 120
  telemetry_min_pings_per_stop: 5
  telemetry_sample_interval_minutes: 15
  fuel_price_per_gallon: 4.5
reefer:
  setpoint_c: -25
  tolerance_c: 5
  excursion_min_minutes: 15
  door_open_speed_threshold_mph: 5
claims_risk:
  weight_short_cases: 0.4
  weight_excursion: 0.4
  weight_door_events: 0.2
  door_event_count_threshold: 5
  band_high: 70
  band_medium: 40
driver_scorecard:
  weight_otp: 0.4
  weight_late_rate: 0.2
  weight_dwell: 0.2
  weight_cases_variance: 0.2
forecast:
  horizon_weeks: 4
  alpha: 0.5
  min_weeks_history: 3
detention:
  threshold_minutes: 120
churn:
  band_churn_risk_pct: -50
  band_declining_pct: -20
  band_growing_pct: 50
capacity:
  min_observed_stops: 5
  use_max_for_observed: true
  fill_pct_cap: 200
  observed_quantile: 0.95
validation:
  sap_match_rate_floor: 0.5
  telemetry_coverage_floor: 0.3
  miles_variance_threshold_pct: 10
map:
  default_max_stops_render: 1500
  default_height_px: 900
vanguard:
  cargo_max_temp_c: -20
  evap_delta_healthy_min: -8
  evap_delta_healthy_max: -5
  evap_delta_degrading_max: -3
  evap_delta_significant_max: -1
  evap_delta_drift_critical_c: 3
  compliance_band_critical_pct: 75
  compliance_baseline_target_pct: 92
  defrost_baseline_per_day: 6
  defrost_elevated_per_day: 8
  defrost_abnormal_per_day: 9
  defrost_max_duration_min: 40
  weight_rh: 0.4
  weight_dr: 0.2
  weight_ts: 0.2
  weight_abhf: 0.2
  band_green_max: 24
  band_yellow_max: 49
  band_orange_max: 74
  band_red_max: 99
  baseline_window_days: 30
  baseline_min_clean_days: 7
  default_baseline_evap_delta: -6.5
  default_baseline_compliance_pct: 90
stop_classification:
  use_s_code_for_plasma: true
  rules:
  - class: DISTRIBUTION_CENTER
    pattern: RX CROSSROADS
  - class: DISTRIBUTION_CENTER
    pattern: WAREHOUSE|WHSE|DISTRIBUTION
  - class: INTERNAL_BASE
    pattern: 'CRST INTERNATIONAL|CRST LOUISVILLE|^CRST '
  - class: INTERNAL_BASE
    pattern: THERMOKING|FUEL|TERMINAL|^BASE
  default_class: OTHER
warehouse_inclusion:
  otp: true
  dwell: true
  customer_scorecard: true
  customer_churn: true
  customer_concentration: true
  claims_risk: true
  reefer_compliance: true
  detention_audit: true
  late_code_analysis: true
  cycle_time: true
  route_kpi: true
  trailer_utilization: true
  driver_scorecard: true
  lane_profitability: true
  loaded_miles: true
  trailer_revenue_weekly: true
  route_revenue_weekly: true
  miles_variance: true
  alarm_log: true
  route_reefer_cost: true
sharepoint:
  enabled: false
  tenant_id: ''
  client_id: ''
  site_url: ''
  source_folder: Shared Documents/DataScrubb/Sources
  db_backup_folder: Shared Documents/DataScrubb/Backups
  auto_push_db: true
  auto_push_excel: true
  keep_last_n_backups: 12
logging:
  level: INFO
  file: logs/pipeline.log
export:
  output_dir: output/
